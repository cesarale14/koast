name: CI

# M9 Phase F STEP 8 — additive gating layer.
#
# Vercel's existing build (tsc + ESLint via `next build`) gates deploys.
# This workflow gates PRs + main pushes with the SAME tsc + ESLint
# checks plus the jest suite — which Vercel does NOT run. That's how
# D24 (voice anti-pattern shape regex via anti-patterns.test.ts) gets
# enforced pre-merge rather than relying on local discipline.
#
# Scope is deliberately minimal per /ultraplan Q-F2 (a):
#   - one job, no matrix (M10 may add a Node version matrix)
#   - three checks: npm run lint, npx tsc --noEmit, npm test
#   - no caching beyond actions/setup-node's npm cache
#   - no test-result publishing, no coverage upload
# Add scope only with explicit decision in conventions.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: lint · tsc · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      # M13 Phase 1.B Step 4 — fluidity perf gate.
      #
      # Runs the perf-test subset of the jest suite (a superset of what
      # `npm test` ran above, but isolated for visibility — the CI log
      # shows a discrete PASS/FAIL for the perceived-action contract).
      # Budgets live in scripts/fluidity-budgets.json; assertions live
      # in jest tests (e.g. src/lib/cmdk/__tests__/filter.test.ts under
      # the "performance" describe block). Per operator msg 3527, hard
      # bound is 2× the budget — production telemetry rollup is the
      # truth source for the 1× contract.
      - name: Fluidity check
        run: npx tsx scripts/fluidity-check.ts
