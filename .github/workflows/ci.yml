name: CI

# M9 Phase F STEP 8 — additive gating layer.
#
# Vercel's existing build (tsc + ESLint via `next build`) gates deploys.
# This workflow gates PRs + main pushes with the SAME tsc + ESLint
# checks plus the jest suite — which Vercel does NOT run. That's how
# D24 (voice anti-pattern shape regex via anti-patterns.test.ts) gets
# enforced pre-merge rather than relying on local discipline.
#
# Scope is deliberately minimal per /ultraplan Q-F2 (a):
#   - one job, no matrix (M10 may add a Node version matrix)
#   - three checks: npm run lint, npx tsc --noEmit, npm test
#   - no caching beyond actions/setup-node's npm cache
#   - no test-result publishing, no coverage upload
# Add scope only with explicit decision in conventions.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: lint · tsc · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      # M13 Phase 1.B Step 6 — doctrine regression-guard.
      #
      # Scans src/lib/agent + src/lib/voice + src/app/api/agent +
      # src/app/(dashboard) + src/components for anti-pattern phrases
      # that violate the Koast Operational Doctrine (vault note
      # milestones/M13/koast-operational-doctrine.md). Test files
      # under __tests__/tests/fixtures are excluded. system-prompt.ts
      # is allowed to mention the phrases inside the doctrine's own
      # negated context. Cheap; runs in <1s.
      - name: Doctrine lint
        run: ./scripts/doctrine-lint.sh

      # M13 Phase 1.B Step 4 — fluidity perf gate.
      #
      # Runs the perf-test subset of the jest suite (a superset of what
      # `npm test` ran above, but isolated for visibility — the CI log
      # shows a discrete PASS/FAIL for the perceived-action contract).
      # Budgets live in scripts/fluidity-budgets.json; assertions live
      # in jest tests (e.g. src/lib/cmdk/__tests__/filter.test.ts under
      # the "performance" describe block). Per operator msg 3527, hard
      # bound is 2× the budget — production telemetry rollup is the
      # truth source for the 1× contract.
      - name: Fluidity check
        run: npx tsx scripts/fluidity-check.ts

      # M13 D1 — conversation read-invariant guard. Fails if a SELECT on
      # agent_conversations appears outside the notDeleted() helper, so a
      # soft-deleted row can never leak into a conversation surface.
      - name: Conversation reads guard
        run: bash scripts/conversation-reads-guard.sh

  # M13 Phase 2 — conversation-lifecycle Playwright E2E gate.
  #
  # Runs the 15 §8-sweep specs (docs/conversation-lifecycle-spec.md) against
  # the NON-PROD staging Supabase project, on every PR + main push. Distinct
  # job so its pass/fail is isolated from lint/tsc/jest, and run in PARALLEL
  # (not `needs: ci`) — isolation of the signal matters more than saving a
  # few runner-minutes on type-broken code (and `next build` below re-checks
  # types anyway).
  #
  # The webServer in playwright.config.ts runs `next build && next start` in
  # CI (prod-faithful), so this job builds the app itself. KOAST_E2E_CANNED_AGENT
  # cans ONLY the LLM call — real rows are still persisted to staging. The
  # prod-guard (e2e/helpers/prod-guard.ts) fails closed: it refuses to run
  # unless NEXT_PUBLIC_SUPABASE_URL matches PLAYWRIGHT_EXPECTED_SUPABASE_REF
  # and is not the prod ref. STAGING VALUES ONLY in the secrets below.
  playwright:
    name: e2e · conversation lifecycle
    runs-on: ubuntu-24.04
    env:
      # Non-sensitive — safe in plain workflow env.
      KOAST_E2E_CANNED_AGENT: '1'
      PLAYWRIGHT_EXPECTED_SUPABASE_REF: aljowaggoulsswtxdtmf
      NEXT_PUBLIC_SUPABASE_URL: https://aljowaggoulsswtxdtmf.supabase.co
      # Sensitive — STAGING values, added at GitHub → Settings → Secrets.
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      DATABASE_URL_POOLED: ${{ secrets.STAGING_DATABASE_URL_POOLED }}
      PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright chromium + OS deps
        run: npx playwright install --with-deps chromium

      - name: E2E — conversation lifecycle (staging)
        run: npm run test:e2e

      # CI failures are blind without artifacts — keep the HTML report +
      # retained traces/screenshots (playwright.config: trace + screenshot
      # retain-on-failure) for download.
      - name: Upload Playwright report + traces on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
