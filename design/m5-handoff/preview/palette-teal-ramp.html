<!doctype html>
<html><head><meta charset="utf-8"><title>Palette · Teal Ramp</title>
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="card" style="flex-direction: column; gap: 18px;">
  <div class="label">5-band ramp · top → bottom · "newest deposit → oldest sediment"</div>
  <div class="grid" style="grid-template-columns: repeat(5, 1fr); flex: 1;">
    <div class="swatch on-light" style="background:#d4eef0;">
      <div><div class="name">Shore Mist</div></div>
      <div class="hex">#d4eef0 · band 1</div>
    </div>
    <div class="swatch on-light" style="background:#a8e0e3;">
      <div><div class="name">Shoal</div></div>
      <div class="hex">#a8e0e3 · band 2</div>
    </div>
    <div class="swatch on-dark" style="background:#4cc4cc;">
      <div><div class="name">Tide</div></div>
      <div class="hex">#4cc4cc · band 3 · primary</div>
    </div>
    <div class="swatch on-dark" style="background:#2ba2ad;">
      <div><div class="name">Reef</div></div>
      <div class="hex">#2ba2ad · band 4</div>
    </div>
    <div class="swatch on-dark" style="background:#0e7a8a;">
      <div><div class="name">Trench</div></div>
      <div class="hex">#0e7a8a · band 5</div>
    </div>
  </div>
</div>
</body></html>
