<!doctype html>
<html><head><meta charset="utf-8"><title>Palette · Substrate</title>
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="card">
  <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
    <div class="swatch on-light" style="background:#f7f3ec; border:0.5px solid #e7e2d6;">
      <div><div class="name">Shore</div><div class="hex">#f7f3ec</div></div>
      <div class="hex">light substrate · warm off-white</div>
    </div>
    <div class="swatch on-dark" style="background:#132e20;">
      <div><div class="name">Deep Sea</div><div class="hex">#132e20</div></div>
      <div class="hex">dark substrate · forest-green</div>
    </div>
    <div class="swatch on-light" style="background:#0f1815; color:#f7f3ec;">
      <div><div class="name">Ink</div><div class="hex">#0f1815</div></div>
      <div class="hex">primary text on light</div>
    </div>
  </div>
</div>
</body></html>
