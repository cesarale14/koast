<!doctype html>
<html><head><meta charset="utf-8"><title>Palette · Text & Rules</title>
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="card">
  <div class="grid" style="grid-template-columns: repeat(4, 1fr);">
    <div class="swatch on-light" style="background:#f7f3ec; border:0.5px solid #e7e2d6;">
      <div><div class="name" style="color:#0f1815;">Ink</div><div class="hex" style="color:#0f1815;">#0f1815</div></div>
      <div class="hex" style="color:#0f1815;">primary text</div>
    </div>
    <div class="swatch on-light" style="background:#f7f3ec; border:0.5px solid #e7e2d6;">
      <div><div class="name" style="color:#4a5552;">Ink-2</div><div class="hex" style="color:#4a5552;">#4a5552</div></div>
      <div class="hex" style="color:#4a5552;">secondary text</div>
    </div>
    <div class="swatch on-light" style="background:#f7f3ec; border:0.5px solid #e7e2d6;">
      <div><div class="name" style="color:#6e7976;">Ink-3</div><div class="hex" style="color:#6e7976;">#6e7976</div></div>
      <div class="hex" style="color:#6e7976;">tertiary · labels</div>
    </div>
    <div class="swatch on-light" style="background:#f7f3ec; border:0.5px solid #e7e2d6; position:relative;">
      <div><div class="name" style="color:#0f1815;">Rule</div><div class="hex" style="color:#0f1815;">#e7e2d6</div></div>
      <div class="hex" style="color:#0f1815;">hairline rules</div>
      <div style="position:absolute; left:14px; right:14px; top:50%; height:1px; background:#e7e2d6;"></div>
    </div>
  </div>
</div>
</body></html>
