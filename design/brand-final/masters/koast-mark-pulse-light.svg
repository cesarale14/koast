<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Koast active small-size (pulse)"><defs><clipPath id="c"><circle cx="50" cy="50" r="46"/></clipPath><style><![CDATA[
@keyframes brightness-pulse{0%,100%{filter:brightness(1) saturate(1)}50%{filter:brightness(1.12) saturate(1.1)}}
.bands{animation:brightness-pulse 1.6s infinite ease-in-out;transform-origin:center}
@media(prefers-reduced-motion:reduce){.bands{animation:none}}
]]></style></defs><g class="bands" clip-path="url(#c)"><rect x="0" y="4" width="100" height="32" fill="#d4eef0"/><rect x="0" y="36" width="100" height="30" fill="#4cc4cc"/><rect x="0" y="66" width="100" height="30" fill="#0e7a8a"/></g></svg>
