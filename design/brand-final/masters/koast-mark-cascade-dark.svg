<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Koast active (cascade)"><defs><clipPath id="c"><circle cx="50" cy="50" r="46"/></clipPath><style><![CDATA[
@keyframes cascade-pulse{0%,40%,65%,100%{opacity:1}50%,55%{opacity:.55}}
.b1{animation:cascade-pulse 3s infinite cubic-bezier(.45,0,.55,1)}
.b2{animation:cascade-pulse 3s infinite cubic-bezier(.45,0,.55,1);animation-delay:.13s}
.b3{animation:cascade-pulse 3s infinite cubic-bezier(.45,0,.55,1);animation-delay:.26s}
.b4{animation:cascade-pulse 3s infinite cubic-bezier(.45,0,.55,1);animation-delay:.39s}
.b5{animation:cascade-pulse 3s infinite cubic-bezier(.45,0,.55,1);animation-delay:.52s}
@media(prefers-reduced-motion:reduce){.b1,.b2,.b3,.b4,.b5{animation:none}}
]]></style></defs><g clip-path="url(#c)"><rect class="b1" x="0" y="4" width="100" height="23" fill="#d4eef0"/><rect class="b2" x="0" y="27" width="100" height="20" fill="#8ad9dc"/><rect class="b3" x="0" y="47" width="100" height="18" fill="#4cc4cc"/><rect class="b4" x="0" y="65" width="100" height="17" fill="#3aa3aa"/><rect class="b5" x="0" y="82" width="100" height="14" fill="#2e8c95"/></g></svg>
